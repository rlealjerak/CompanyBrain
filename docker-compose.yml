version: "3.9"

services:
  # ── PostgreSQL 15 with pgvector extension ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-company_brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-company_brain}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-company_brain}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis (Celery broker + query cache) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Schema migrations (run once before api/worker/beat) ─────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-company_brain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-company_brain}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── FastAPI ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-company_brain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-company_brain}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Celery worker (brain + personal queues) ──────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.celery_app worker
      -Q brain,personal
      --concurrency 4
      --loglevel INFO
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-company_brain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-company_brain}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # beat service added in Phase 3 once brain_tasks.scan_and_ingest is implemented.

  # ── React frontend (Vite dev server) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_API_PROXY_TARGET: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: company_brain_net
